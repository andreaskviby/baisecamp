baseURL = 'https://baisecamp.com/'
locale = 'en-us'
title = 'Baisecamp'
enableRobotsTXT = true

[params]
  author = 'Andreas Kviby'
  description = 'Learn how to connect AI agents to Basecamp for automated project work. Technical deep-dives for developers, plus services for teams who want AI teammates.'
  mainSections = ['posts']
  images = ['images/og-default.png']

[params.homeInfoParams]
  Title = "Baisecamp"
  Content = "Where AI Agents meet Basecamp. Exploring the intersection of AI-powered development and classic project management since 2007."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/andreaskviby"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/andreas-kviby-576b787b/"

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/andreaskviby"

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML']
  term = ['HTML']

[outputFormats]
  [outputFormats.RSS]
    mediaType = 'application/rss+xml'
    baseName = 'feed'
